<!-- Chỉ phần body được cải tiến -->
<body class="container py-5">
    <h2 class="mb-4 text-primary">Chat Box - Gửi ảnh</h2>
    <div class="chat-box border rounded p-3 mb-4" style="height: 400px; overflow-y: auto; background: #f0f2f5;">
        <!-- Bong bóng hình ảnh gửi -->
        {% if preview %}
        <div class="d-flex justify-content-end mb-2">
            <div class="bg-primary text-white p-2 rounded" style="max-width: 60%;">
                <img src="{{ preview_url }}" class="img-fluid rounded mb-1" alt="Preview">
                <div class="small">Watermark: {{ watermark }}</div>
            </div>
        </div>
        {% endif %}
    </div>

    <!-- Form gửi -->
    <form method="post" enctype="multipart/form-data" id="sendForm">
        <div class="d-flex gap-2">
            <input type="file" name="photo" required accept="image/*" onchange="previewImage(event)" class="form-control">
            <input type="text" name="watermark" placeholder="Watermark..." class="form-control" required>
            <button type="submit" class="btn btn-primary">Gửi</button>
        </div>
    </form>
</body>
