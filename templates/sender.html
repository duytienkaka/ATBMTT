<!DOCTYPE html>
<html>
<head>
    <title>Sender Web</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .preview-img {
            max-width: 300px;
            max-height: 200px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-primary">Gửi ảnh có watermark</h2>
    <form method="post" enctype="multipart/form-data" class="mb-3" id="sendForm">
        <div class="mb-3">
            <label class="form-label">Ảnh:</label>
            <input type="file" name="photo" class="form-control" required accept="image/*" onchange="previewImage(event)">
            <img id="imgPreview" class="preview-img rounded shadow" alt="Preview">
        </div>
        <div class="mb-3">
            <label class="form-label">Watermark:</label>
            <input type="text" name="watermark" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Gửi</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        <div>
        {% for category, message in messages %}
          <div class="alert alert-{{'success' if category=='success' else 'danger'}}">{{ message }}</div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <script>
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }
    </script>
</body>
</html>
