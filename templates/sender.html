<!DOCTYPE html>
<html>
<head>
    <title>Sender Web</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .chat-box {
            background-color: #f0f2f5;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
        }
        .chat-bubble-right {
            max-width: 60%;
            background-color: #0084ff;
            color: white;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            align-self: flex-end;
        }
        .chat-bubble-right img {
            max-width: 100%;
            border-radius: 10px;
        }
        .form-wrapper {
            display: flex;
            gap: 10px;
        }
        .preview-img {
            max-width: 200px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-primary">Chat Box - Gửi ảnh</h2>

    <div class="chat-box d-flex flex-column">
        {% if preview %}
        <div class="chat-bubble-right ms-auto">
            <img src="{{ preview_url }}" alt="Ảnh preview">
            <div class="small mt-1">Watermark: {{ watermark }}</div>
        </div>
        {% endif %}
    </div>

    <form method="post" enctype="multipart/form-data" id="sendForm">
        <div class="form-wrapper">
            <input type="file" name="photo" required accept="image/*" onchange="previewImage(event)" class="form-control">
            <input type="text" name="watermark" placeholder="Watermark..." class="form-control" required>
            <button type="submit" class="btn btn-primary">Gửi</button>
        </div>
        <img id="imgPreview" class="preview-img rounded shadow" alt="Preview">
    </form>

    <script>
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }
    </script>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const chatBox = document.querySelector('.chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;

    document.getElementById('sendForm').addEventListener('submit', function() {
        const preview = document.getElementById('imgPreview');
        if (preview.style.display === 'block') {
            preview.style.display = 'none';
        }
    });
    document.querySelector('input[type="file"]').addEventListener('change', function() {
        const preview = document.getElementById('imgPreview');
        if (preview.style.display === 'block') {
            preview.style.display = 'none';
        }
    });
    document.querySelector('input[name="watermark"]').addEventListener('input', function() {
        const preview = document.getElementById('imgPreview');
        if (preview.style.display === 'block') {
            preview.style.display = 'none';
        }
    });
</script>
