<!DOCTYPE html>
<html>
<head>
    <title>Receiver Web</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .received-img {
            max-width: 400px;
            max-height: 300px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-success">Ảnh đã nhận</h2>
    {% if img_exists %}
        <img src="{{ url_for('show') }}" class="received-img rounded shadow" alt="Ảnh đã nhận">
        <br>
        <a href="{{ url_for('show') }}" download class="btn btn-outline-primary">Tải ảnh về</a>
    {% else %}
        <div class="alert alert-warning">Chưa có ảnh nào được nhận.</div>
    {% endif %}
</body>
</html>
