<body class="container py-5">
    <h2 class="mb-4 text-success">Chat Box - Ảnh đã nhận</h2>
    <div class="chat-box border rounded p-3" style="height: 400px; overflow-y: auto; background: #f0f2f5;">
        {% if img_exists %}
        <div class="d-flex justify-content-start mb-2">
            <div class="bg-light p-2 rounded" style="max-width: 60%;">
                <img src="{{ url_for('show') }}" class="received-img rounded shadow-sm mb-1" alt="Ảnh đã nhận">
                <a href="{{ url_for('show') }}" download class="btn btn-sm btn-outline-primary">Tải ảnh về</a>
            </div>
        </div>
        {% else %}
        <div class="alert alert-warning">Chưa có ảnh nào được nhận.</div>
        {% endif %}
    </div>
</body>
