<!DOCTYPE html>
<html>
<head>
    <title>Receiver Web</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .chat-box {
            background-color: #f0f2f5;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
        }
        .chat-bubble-left {
            max-width: 60%;
            background-color: #e4e6eb;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .chat-bubble-left img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-success">Chat Box - Ảnh đã nhận</h2>

    <div class="chat-box">
        {% if img_exists %}
            <div class="chat-bubble-left">
                <img src="{{ url_for('show') }}" alt="Ảnh đã nhận">
                <a href="{{ url_for('show') }}" download class="btn btn-sm btn-outline-primary mt-2">Tải ảnh về</a>
            </div>
        {% else %}
            <div class="alert alert-warning">Chưa có ảnh nào được nhận.</div>
        {% endif %}
    </div>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const chatBox = document.querySelector('.chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>
